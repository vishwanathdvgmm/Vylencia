base_model: google/gemma-2-2b-it
adapter_type: lora

lora:
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
        - q_proj
        - k_proj
        - v_proj
        - o_proj

training:
    task_type: instruction_tuning
    epochs: 3
    batch_size: 2
    gradient_accumulation: 8
    learning_rate: 2e-4
    warmup_ratio: 0.05
    max_seq_length: 512
    fp16: true

data:
    format: jsonl
    path: data/vylencia_language.jsonl
    input_key: context
    output_key: response

constraints:
    allow_creativity_only_in:
        - ENTERTAINMENT
    forbid:
        - commands
        - threats
        - dependency_language
        - self_modification
